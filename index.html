<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ Real Time PVP</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
text-align:center;
overflow:hidden;
}

h1{margin:10px;}

.arena{
display:flex;
justify-content:space-between;
padding:10px;
}

.player{
width:48%;
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:10px;
}

.hpbar{
background:#333;
height:20px;
border-radius:10px;
overflow:hidden;
margin:10px 0;
}

.hpfill{
height:100%;
background:lime;
width:100%;
transition:0.3s;
}

.buttons{
display:flex;
flex-direction:column;
gap:8px;
}

button{
padding:12px;
border:none;
border-radius:8px;
font-weight:bold;
color:white;
font-size:14px;
}

.attack{background:#e74c3c;}
.skill{background:#f39c12;}
.heal{background:#27ae60;}

button:disabled{
opacity:0.4;
}

.log{
position:absolute;
bottom:0;
width:100%;
background:rgba(0,0,0,0.5);
height:100px;
overflow:auto;
font-size:12px;
padding:5px;
}

.shake{
animation:shake 0.2s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}
</style>
</head>

<body>

<h1>⚔️ REAL TIME PVP ⚔️</h1>

<div class="arena">

<div class="player" id="p1box">
<h2>Player 1</h2>
<div class="hpbar"><div class="hpfill" id="hp1"></div></div>
<p>HP: <span id="p1hp">100</span></p>
<div class="buttons">
<button class="attack" onclick="attack(1)">Attack</button>
<button class="skill" onclick="skill(1)">Skill</button>
<button class="heal" onclick="heal(1)">Heal</button>
</div>
</div>

<div class="player" id="p2box">
<h2>Player 2</h2>
<div class="hpbar"><div class="hpfill" id="hp2"></div></div>
<p>HP: <span id="p2hp">100</span></p>
<div class="buttons">
<button class="attack" onclick="attack(2)">Attack</button>
<button class="skill" onclick="skill(2)">Skill</button>
<button class="heal" onclick="heal(2)">Heal</button>
</div>
</div>

</div>

<div class="log" id="log"></div>

<script>

let p1={hp:100, cooldown:false}
let p2={hp:100, cooldown:false}
let gameOver=false

function update(){
document.getElementById("p1hp").textContent=p1.hp
document.getElementById("p2hp").textContent=p2.hp
document.getElementById("hp1").style.width=p1.hp+"%"
document.getElementById("hp2").style.width=p2.hp+"%"
}

function log(text){
let box=document.getElementById("log")
box.innerHTML+=text+"<br>"
box.scrollTop=box.scrollHeight
}

function shake(id){
let el=document.getElementById(id)
el.classList.add("shake")
setTimeout(()=>el.classList.remove("shake"),200)
}

function attack(player){
if(gameOver) return

let dmg=Math.floor(Math.random()*8)+8

if(player===1 && !p1.cooldown){
p2.hp-=dmg
shake("p2box")
log("⚔️ P1 -"+dmg)
cooldown(p1)
}else if(player===2 && !p2.cooldown){
p1.hp-=dmg
shake("p1box")
log("⚔️ P2 -"+dmg)
cooldown(p2)
}

checkWin()
update()
}

function skill(player){
if(gameOver) return

let dmg=Math.floor(Math.random()*15)+20

if(player===1 && !p1.cooldown){
p2.hp-=dmg
shake("p2box")
log("🔥 P1 SKILL -"+dmg)
cooldown(p1,1500)
}else if(player===2 && !p2.cooldown){
p1.hp-=dmg
shake("p1box")
log("🔥 P2 SKILL -"+dmg)
cooldown(p2,1500)
}

checkWin()
update()
}

function heal(player){
if(gameOver) return

let heal=Math.floor(Math.random()*10)+15

if(player===1 && !p1.cooldown){
p1.hp=Math.min(p1.hp+heal,100)
log("❤️ P1 +"+heal)
cooldown(p1)
}else if(player===2 && !p2.cooldown){
p2.hp=Math.min(p2.hp+heal,100)
log("❤️ P2 +"+heal)
cooldown(p2)
}

update()
}

function cooldown(player,time=800){
player.cooldown=true
setTimeout(()=>player.cooldown=false,time)
}

function checkWin(){
if(p1.hp<=0){
log("🏆 PLAYER 2 MENANG!")
gameOver=true
}
if(p2.hp<=0){
log("🏆 PLAYER 1 MENANG!")
gameOver=true
}
}

update()

</script>

</body>
</html>
